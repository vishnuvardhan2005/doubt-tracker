name: CI

# Run on every push (any branch) and on PRs targeting main. CI only — no deploy.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Server tests
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the test run — isolated per job, wiped with the
    # runner. The suite's `db push --accept-data-loss` and per-test table wipe
    # operate on this throwaway DB, never a shared/remote one.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: doubttracker_test
        ports:
          - 5432:5432
        # Gate the job until Postgres accepts connections.
        options: >-
          --health-cmd "pg_isready -U test -d doubttracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Point the test DB at the service container above.
    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/doubttracker_test

    # All run steps execute in /server (the backend lives there).
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies (server only)
        run: npm ci

      # The test suite reads its config from server/.env (npm test uses
      # `node --env-file=.env`, which errors if the file is missing). JWT_SECRET
      # only signs ephemeral test tokens, so a fixed non-sensitive value is fine.
      - name: Configure test environment
        run: |
          {
            echo "TEST_DATABASE_URL=$TEST_DATABASE_URL"
            echo "JWT_SECRET=ci-test-secret"
            echo "NODE_ENV=test"
          } > .env

      # Generate the Prisma client so the tests can instantiate PrismaClient.
      - name: Generate Prisma client
        run: npx prisma generate

      # A non-zero exit here fails the job (and thus the workflow).
      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Render
    # Only after the test job succeeds...
    needs: test
    # ...and only on a push to main (never on PRs or other branches).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # Trigger a Render deploy via its API. Render builds the Docker image from
      # server/Dockerfile (configured on the Render service) and rolls it out.
      - name: Trigger Render deploy
        env:
          DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          http_code=$(curl -sS -o response.json -w '%{http_code}' \
            -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $DEPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Render API responded: $http_code"
          cat response.json
          # 2xx = deploy accepted; anything else fails the job.
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render deploy trigger failed (HTTP $http_code)"
            exit 1
          fi

      # Simple success/failure notification via the workflow status.
      - name: Report deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::✅ Deploy to Render triggered successfully"
          else
            echo "::error::❌ Deploy to Render failed"
          fi
